name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Restore the Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Verify formatting
        run: cargo fmt --check

      - name: Run clippy in deny-warnings mode
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run the test suite
        run: cargo test --locked

      - name: Smoke-check release builds
        run: |
          cargo build --release --locked
          cargo check --locked --target aarch64-apple-darwin

  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore the Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build the release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package the release archive
        run: |
          mkdir -p dist
          tar -czf "dist/symphony-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" \
            symphony

      - name: Attest the build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/symphony-${{ matrix.target }}.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/symphony-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release checksums
        working-directory: dist
        run: shasum -a 256 symphony-*.tar.gz > SHA256SUMS.txt

      - name: Publish the GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS.txt --generate-notes
