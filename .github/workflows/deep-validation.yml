name: Deep Validation

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage-and-integration:
    name: coverage-and-integration
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Rust toolchain with LLVM tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Restore the Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run hermetic tests with coverage enforcement
        run: cargo llvm-cov --workspace --all-features --tests --locked --fail-under-lines 70

  prepare-real-integration:
    name: prepare-real-integration
    runs-on: ubuntu-24.04
    outputs:
      can_run: ${{ steps.gate.outputs.can_run }}
      project_slug: ${{ steps.gate.outputs.project_slug }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - name: Decide whether live smoke tests can run
        id: gate
        uses: ./.github/actions/real-integration-gate
        with:
          linear_api_key: ${{ secrets.LINEAR_API_KEY }}
          project_slug_from_var: ${{ vars.SYMPHONY_LINEAR_PROJECT_SLUG }}
          project_slug_from_secret: ${{ secrets.SYMPHONY_LINEAR_PROJECT_SLUG }}

  real-integration:
    name: real-integration
    runs-on: ubuntu-24.04
    needs: prepare-real-integration
    if: ${{ needs.prepare-real-integration.outputs.can_run == 'true' }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore the Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run the live Linear smoke test
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          SYMPHONY_LINEAR_PROJECT_SLUG: ${{ needs.prepare-real-integration.outputs.project_slug }}
          SYMPHONY_LINEAR_ENDPOINT: ${{ vars.SYMPHONY_LINEAR_ENDPOINT }}
        run: cargo test --locked --test real_integration live_linear_candidate_fetch_smoke -- --ignored --exact --nocapture

      - name: Detect Codex CLI availability
        id: codex
        run: |
          if command -v codex >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report skipped Codex smoke coverage
        if: ${{ steps.codex.outputs.available != 'true' }}
        run: echo "::notice::Skipping codex_cli_schema_generation_smoke because the Codex CLI is not installed on this runner."

      - name: Run the Codex CLI smoke test
        if: ${{ steps.codex.outputs.available == 'true' }}
        run: cargo test --locked --test real_integration codex_cli_schema_generation_smoke -- --ignored --exact --nocapture

      - name: Run the heavy orchestrator retry churn test
        run: cargo test --locked --lib orchestrator_heavy_retry_reschedule_churn -- --ignored --nocapture

  real-integration-skip:
    name: real-integration-skip
    runs-on: ubuntu-24.04
    needs: prepare-real-integration
    if: ${{ needs.prepare-real-integration.outputs.can_run != 'true' }}
    steps:
      - name: Explain why live smoke tests were skipped
        run: echo "::notice::Skipping live integration smoke tests: ${{ needs.prepare-real-integration.outputs.reason }}."
